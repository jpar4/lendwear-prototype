<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LendWear - Visual Prototype</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen items-center font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LendWearApp = () => {
          const [activeTab, setActiveTab] = useState('onboarding');
          const [step, setStep] = useState(1);
          const [plan, setPlan] = useState('essential'); 
          
          const [userData, setUserData] = useState({ 
            gender: 'Womenswear',
            height: 165, 
            weight: 55, 
            style: 'Modern Business Casual',
            brands: []
          });
          
          const [swapped, setSwapped] = useState(false);

          const toggleBrand = (brand) => {
            if (userData.brands.includes(brand)) {
              setUserData({ ...userData, brands: userData.brands.filter(b => b !== brand) });
            } else {
              setUserData({ ...userData, brands: [...userData.brands, brand] });
            }
          };

          const availableBrands = ['Zara', 'COS', 'Uniqlo U', 'Ralph Lauren', 'Theory', 'Hugo Boss', 'Club Monaco', 'Massimo Dutti'];

          // 플랜별 의류 데이터 (이미지 URL 추가)
          const planDetails = {
            essential: {
              name: 'Essential',
              price: 40,
              outfit: "Smart Cotton Blazer & Slim-fit Chinos",
              items: [
                { 
                  id: 1, 
                  name: "Stretch Cotton Blazer", 
                  category: "Essential", 
                  image: "https://images.unsplash.com/photo-1594938291221-94f18cbb5660?w=400&q=80" 
                },
                { 
                  id: 2, 
                  name: swapped ? "Polo Knit Shirt" : "Oxford Shirt", 
                  category: "Top", 
                  image: swapped 
                    ? "https://images.unsplash.com/photo-1626497764746-6dc36546b388?w=400&q=80" 
                    : "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=400&q=80" 
                },
                { 
                  id: 3, 
                  name: "Tapered Chinos", 
                  category: "Bottom", 
                  image: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?w=400&q=80" 
                }
              ]
            },
            premium: {
              name: 'Executive',
              price: 80,
              outfit: "Wool-blend Designer Suit & Silk Blouse",
              items: [
                { 
                  id: 1, 
                  name: "Super 100s Wool Blazer", 
                  category: "Premium", 
                  image: "https://images.unsplash.com/photo-1593030761757-71fae45fa0e7?w=400&q=80" 
                },
                { 
                  id: 2, 
                  name: swapped ? "Cashmere V-neck" : "Italian Silk Blouse", 
                  category: "Luxury Top", 
                  image: swapped 
                    ? "https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=400&q=80" 
                    : "https://images.unsplash.com/photo-1551794017-068307d9249e?w=400&q=80" 
                },
                { 
                  id: 3, 
                  name: "Tailored Dress Trousers", 
                  category: "Premium Bottom", 
                  image: "https://images.unsplash.com/photo-1584865288642-42078afe6942?w=400&q=80" 
                }
              ]
            }
          };

          const currentPlan = planDetails[plan];

          return (
            <div className="bg-white w-full max-w-md h-[700px] overflow-hidden shadow-2xl relative border-x border-gray-200 flex flex-col">
              
              {/* Header */}
              <header className="bg-slate-900 text-white p-4 flex justify-between items-center shrink-0 z-10 shadow-md">
                <h1 className="text-xl font-bold flex items-center gap-2">💼 LendWear</h1>
                {activeTab !== 'onboarding' && (
                  <div className="flex items-center gap-2">
                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase ${plan === 'premium' ? 'bg-amber-400 text-slate-900' : 'bg-slate-700 text-slate-300'}`}>
                      {plan}
                    </span>
                  </div>
                )}
              </header>

              {/* Main Content Area */}
              <div className="flex-1 overflow-y-auto pb-24 relative">
                
                {/* 탭 1: 온보딩 설문 */}
                {activeTab === 'onboarding' && (
                  <div className="p-6 space-y-6">
                    <div className="flex gap-2 mb-6">
                      <div className={`h-1.5 flex-1 rounded-full ${step >= 1 ? 'bg-slate-900' : 'bg-gray-200'}`}></div>
                      <div className={`h-1.5 flex-1 rounded-full ${step >= 2 ? 'bg-slate-900' : 'bg-gray-200'}`}></div>
                      <div className={`h-1.5 flex-1 rounded-full ${step >= 3 ? 'bg-slate-900' : 'bg-gray-200'}`}></div>
                    </div>

                    {step === 1 && (
                      <div className="space-y-6 animate-fadeIn">
                        <div>
                          <h2 className="text-2xl font-black text-slate-900">Welcome to LendWear</h2>
                          <p className="text-gray-500 mt-1">Let's build your style profile.</p>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-700 mb-2">What are you shopping for?</label>
                          <div className="grid grid-cols-2 gap-3">
                            {['Menswear', 'Womenswear'].map(gender => (
                              <button key={gender} onClick={() => setUserData({...userData, gender})} className={`py-3 rounded-xl border-2 font-bold transition ${userData.gender === gender ? 'border-slate-900 bg-slate-900 text-white' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                                {gender}
                              </button>
                            ))}
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Height (cm)</label>
                            <input type="number" value={userData.height} onChange={(e) => setUserData({...userData, height: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none" />
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Weight (kg)</label>
                            <input type="number" value={userData.weight} onChange={(e) => setUserData({...userData, weight: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none" />
                          </div>
                        </div>
                        <button onClick={() => setStep(2)} className="w-full mt-4 bg-slate-900 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-95 transition">Continue</button>
                      </div>
                    )}

                    {step === 2 && (
                      <div className="space-y-6 animate-fadeIn">
                        <div>
                          <button onClick={() => setStep(1)} className="text-sm text-gray-400 mb-2 hover:text-slate-900">← Back</button>
                          <h2 className="text-2xl font-black text-slate-900">Office Vibe</h2>
                          <p className="text-gray-500 mt-1">How do you usually dress for work?</p>
                        </div>
                        <div className="space-y-3">
                          {['Conservative Corporate', 'Modern Business Casual', 'Creative Professional'].map(style => (
                            <div key={style} onClick={() => setUserData({...userData, style})} className={`p-4 border-2 rounded-xl cursor-pointer transition-all flex justify-between items-center font-bold ${userData.style === style ? 'border-slate-900 bg-slate-50 text-slate-900' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                              <span>{style}</span>
                              {userData.style === style && <span>✅</span>}
                            </div>
                          ))}
                        </div>
                        <button onClick={() => setStep(3)} className="w-full mt-4 bg-slate-900 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-95 transition">Next</button>
                      </div>
                    )}

                    {step === 3 && (
                      <div className="space-y-6 animate-fadeIn">
                        <div>
                          <button onClick={() => setStep(2)} className="text-sm text-gray-400 mb-2 hover:text-slate-900">← Back</button>
                          <h2 className="text-2xl font-black text-slate-900">Favorite Brands</h2>
                          <p className="text-gray-500 mt-1">Select brands you love (Optional).</p>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {availableBrands.map(brand => (
                            <button key={brand} onClick={() => toggleBrand(brand)} className={`px-4 py-2 rounded-full border-2 text-sm font-bold transition-all ${userData.brands.includes(brand) ? 'border-slate-900 bg-slate-900 text-white' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                              {userData.brands.includes(brand) ? '✓ ' : ''}{brand}
                            </button>
                          ))}
                        </div>
                        <button onClick={() => { setActiveTab('dashboard'); setStep(1); }} className="w-full mt-8 bg-slate-900 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-95 transition">
                          Complete Profile
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* 탭 2: 대시보드 (이미지 적용) */}
                {activeTab === 'dashboard' && (
                  <div className="p-5 space-y-6 animate-fadeIn">
                    
                    <div>
                      <h2 className="text-xl font-black text-slate-900">Your Style Feed</h2>
                      <p className="text-sm text-gray-500">Curated for {userData.gender.replace('wear', '')}s • {userData.style}</p>
                      {userData.brands.length > 0 && (
                         <p className="text-xs font-bold text-amber-600 mt-1">Including hints of: {userData.brands.join(', ')}</p>
                      )}
                    </div>

                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-200">
                      <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Weekly Match</div>
                      <h2 className="text-lg font-black text-slate-900">{currentPlan.outfit}</h2>
                    </div>

                    <div className="space-y-3">
                      <h3 className="font-bold text-lg text-slate-800 flex justify-between items-center">
                        <span>Delivery Preview</span>
                      </h3>
                      {/* 이미지와 함께 보여주는 리스트 형식으로 변경 */}
                      <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                        {currentPlan.items.map((item, idx) => (
                          <div key={item.id} className="p-4 flex items-center gap-4 border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                            
                            {/* 옷 이미지 썸네일 */}
                            <img 
                              src={item.image} 
                              alt={item.name} 
                              className="w-16 h-16 rounded-xl object-cover border border-gray-200 shadow-sm shrink-0"
                            />
                            
                            <div className="flex-1">
                              <div className="text-[10px] font-bold text-gray-400 uppercase tracking-tight mb-0.5">{item.category}</div>
                              <div className="font-medium text-sm text-slate-900 leading-tight">{item.name}</div>
                            </div>
                            
                            {/* SWAP 버튼 (가운데 아이템에만 적용) */}
                            {idx === 1 && (
                              <button onClick={() => setSwapped(!swapped)} className="bg-slate-100 text-[10px] font-black px-3 py-1.5 rounded-full hover:bg-slate-200 active:scale-90 transition shrink-0 border border-slate-200 shadow-sm">
                                🔄 SWAP
                              </button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 탭 3: 구독 플랜 설정 */}
                {activeTab === 'settings' && (
                  <div className="p-5 space-y-6 animate-fadeIn">
                    <h2 className="text-2xl font-black text-slate-900">Choose Your Tier</h2>
                    <div className="space-y-4">
                      <div onClick={() => setPlan('essential')} className={`p-5 rounded-2xl border-2 transition-all cursor-pointer ${plan === 'essential' ? 'border-slate-900 bg-slate-50 shadow-md' : 'border-gray-100'}`}>
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <h3 className="font-bold text-lg">Essential</h3>
                            <p className="text-xs text-slate-500">High-street Premium</p>
                          </div>
                          <div className="text-right">
                            <span className="text-2xl font-black">$40</span><span className="text-xs block text-gray-400">/ wk</span>
                          </div>
                        </div>
                      </div>
                      <div onClick={() => setPlan('premium')} className={`p-5 rounded-2xl border-2 transition-all cursor-pointer relative ${plan === 'premium' ? 'border-amber-500 bg-amber-50 shadow-md' : 'border-gray-100'}`}>
                        {plan === 'premium' && <div className="absolute top-0 right-0 bg-amber-500 text-white text-[8px] font-bold px-3 py-1 rounded-bl-lg">ACTIVE</div>}
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <h3 className="font-bold text-lg">Executive</h3>
                            <p className="text-xs text-amber-700">Luxury Designer Labels</p>
                          </div>
                          <div className="text-right">
                            <span className="text-2xl font-black">$80</span><span className="text-xs block text-gray-400">/ wk</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* Navigation Bar */}
              <nav className="bg-white border-t border-gray-200 flex justify-around p-4 absolute bottom-0 w-full z-20 shadow-lg">
                <button onClick={() => {setActiveTab('onboarding'); setStep(1);}} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition ${activeTab === 'onboarding' ? 'text-slate-900' : 'text-gray-400'}`}>
                  <span className="text-xl">👤</span> PROFILE
                </button>
                <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition ${activeTab === 'dashboard' ? 'text-slate-900' : 'text-gray-400'}`}>
                  <span className="text-xl">📅</span> WEEKLY
                </button>
                <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 text-[10px] font-bold transition ${activeTab === 'settings' ? 'text-slate-900' : 'text-gray-400'}`}>
                  <span className="text-xl">💳</span> PLAN
                </button>
              </nav>
              
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LendWearApp />);
    </script>
</body>
</html>
